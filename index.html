<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscriptions Concours Pétanque</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0b0b0b, #0f5f2e);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.card {
  max-width: 520px;
  width: 92%;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(8px);
  padding: 32px;
  border-radius: 24px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  text-align: center;
}

h1 {
  margin: 0 0 8px;
  font-size: 2rem;
}

p {
  opacity: 0.9;
  margin-bottom: 24px;
}

.ball {
  font-size: 44px;
}

.btn {
  display: block;
  text-decoration: none;
  color: #fff;
  padding: 18px 20px;
  margin: 14px 0;
  border-radius: 16px;
  font-weight: bold;
  font-size: 1.1rem;
  transition: 0.2s;
}

.btn:hover {
  transform: translateY(-2px) scale(1.02);
}

.green {
  background: #19a34a;
}

.dark {
  background: #111;
  border: 2px solid #28c76f;
}

.small {
  font-size: 0.9rem;
  opacity: 0.8;
  margin-top: 18px;
}
</style>

</head>

<body>

<div class="card">

<div class="ball">⚫🟢⚫</div>

<h1>Concours de Pétanque</h1>

<p>Choisissez votre inscription et rejoignez la fête ! 🎉</p>

<a class="btn green" href="https://www.helloasso.com/associations/carreau-champagnolais/evenements/regional-de-petanque-champagnole" target="_blank">
🏆 DB Régional Open
</a>

<a class="btn dark" href="https://www.helloasso.com/associations/carreau-champagnolais/evenements/regional-de-petanque-champagnole-2" target="_blank">
👭 DB Départemental Féminin
</a>

<div class="small">Carreau Champagnolais • Vert & Noir</div>

</div>

</body>
</html>
